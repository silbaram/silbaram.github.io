<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js" type="text/javascript"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js" type="text/javascript"></script>
<script src="https://drive.google.com/uc?id=0B9P_uVbT95u4ZWZrNWJwSDU3cFk" type="text/javascript"></script>

<script type="text/javascript">

  j2e.addRole({name:"top_menu_role_1", role:[{share: "100", backgroundColor:"#FFFFFF"}]});
  j2e.addRole({name:"top_menu_role_2", role:[{share: "100", backgroundColor:"#3575D3"}]});

  $(document).ready(function(){
    $(".nav.navbar-nav.navbar-right li").each(function(index){
        //상단 메뉴 마우스 오버시 색 변경
        $(this).mouseenter(function() {
          j2e(this).setDuration(0.5).setFillMode("forwards").animate({name:"top_menu_role_1"});
        });
        $(this).mouseleave(function() {
          j2e(this).setDuration(0.5).setFillMode("forwards").animate({name:"top_menu_role_2"});
        });
    });
  });
</script>
