
<script type="text/javascript">

  j2e.addRole({name:"role_1", role:[{share: "100", backgroundSize:"100px 100px"}]});

  $(document).ready(function(){
    $("#demo_contain").click(function(){
      j2e("#demo_contain").setDuration(1).animate({name:"role_1"});
    });

    var checkValue = 0;
    $("#demo_contain2").click(function(){
      let value = "";
      if(checkValue == 0) {
        value = "100px 100px";
        checkValue = 1;
      } else if (checkValue == 1) {
        value = "15px 15px";
        checkValue = 0;
      }
      j2e("#demo_contain2").animate({role:[{duration: 1, backgroundSize:value}]});
    });
  });
</script>
