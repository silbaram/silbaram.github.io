
<script type="text/javascript">

  j2e.addRole({name:"role_1", role:[{share: "100", borderBottom:"15px solid red"}]});

  $(document).ready(function(){
    $("#keyframeBottomButton").click(function(){
      j2e("#keyframeBottomButton").setDuration(1).animate({name:"role_1"});
    });

    var checkValue = 0;
    $("#trasitionBottomButton").click(function(){
      let backgroundPositionValue = "";
      if(checkValue == 0) {
        backgroundPositionValue = "15px solid red";
        checkValue = 1;
      } else if (checkValue == 1) {
        backgroundPositionValue = "0px solid red";
        checkValue = 0;
      }
      j2e("#trasitionBottomButton").animate({role:[{duration: 1, borderBottom:backgroundPositionValue}]});
    });
  });
</script>
